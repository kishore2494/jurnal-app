<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
  <meta name="google-site-verification" content="w2EHGR95fVgvKWQ54zXT4rUVEbezhZg5YiokbvLjHoU">
  <meta name="theme-color" content="#0b0f1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Daily Pulse">
  <title>Daily Pulse</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div>
        <h1 id="screen-title">Today</h1>
        <div class="sub" id="screen-sub">—</div>
      </div>
      <div class="streak-badge" id="streak-badge">🔥 <span id="streak-n">0</span></div>
    </div>

    <!-- ============ TODAY / LOG ============ -->
    <section class="screen on" id="s-today"></section>

    <!-- ============ TIME (24h activity tracker) ============ -->
    <section class="screen" id="s-time"></section>

    <!-- ============ TASKS ============ -->
    <section class="screen" id="s-tasks"></section>

    <!-- ============ NOTES ============ -->
    <section class="screen" id="s-notes"></section>

    <!-- ============ PLANS ============ -->
    <section class="screen" id="s-plans"></section>

    <!-- ============ GYM ============ -->
    <section class="screen" id="s-gym"></section>

    <!-- ============ HABITS ============ -->
    <section class="screen" id="s-habits"></section>

    <!-- ============ DASHBOARD ============ -->
    <section class="screen" id="s-dash"></section>

    <!-- ============ WRITE (inner blog) ============ -->
    <section class="screen" id="s-write"></section>

    <!-- ============ CUSTOMIZE ============ -->
    <section class="screen" id="s-custom"></section>

    <!-- ============ CALENDAR ============ -->
    <section class="screen" id="s-cal"></section>

    <!-- ============ HISTORY ============ -->
    <section class="screen" id="s-history"></section>

    <!-- ============ SETTINGS ============ -->
    <section class="screen" id="s-settings"></section>
  </div>

  <nav class="nav" id="nav">
    <button data-screen="today" class="on"><span class="ico">📝</span>Log</button>
    <button data-screen="time"><span class="ico">⏱️</span>Time</button>
    <button data-screen="tasks"><span class="ico">✅</span>Tasks</button>
    <button data-screen="notes"><span class="ico">🗒️</span>Notes</button>
    <button data-screen="plans"><span class="ico">📋</span>Plans</button>
    <button data-screen="gym"><span class="ico">💪</span>Gym</button>
    <button data-screen="habits"><span class="ico">🔥</span>Habits</button>
    <button data-screen="dash"><span class="ico">📊</span>Stats</button>
    <button data-screen="cal"><span class="ico">📆</span>Cal</button>
    <button data-screen="write"><span class="ico">✍️</span>Write</button>
    <button data-screen="settings"><span class="ico">⚙️</span>More</button>
  </nav>

  <div class="alarm-overlay" id="alarm">
    <div class="alarm-bell">⏰</div>
    <div class="alarm-label" id="alarm-label"></div>
    <div class="alarm-sub" id="alarm-sub"></div>
    <div class="alarm-btns">
      <button class="btn btn-primary" id="alarm-dismiss">Dismiss</button>
      <button class="btn btn-ghost" id="alarm-snooze">Snooze 5 min</button>
    </div>
  </div>

  <div class="onboard" id="onboard"></div>

  <div class="toast" id="toast"></div>
  <script src="workout-anims.js"></script>
  <script src="workout-plan.js"></script>
  <script src="app.js"></script>
</body>
</html>
